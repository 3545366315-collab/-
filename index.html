<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定投财富增长模拟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 25px;
            padding: 15px;
        }
        .header h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p { font-size: 1rem; opacity: 0.9; }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 25px;
            margin-bottom: 20px;
        }
        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .control-group {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }
        .control-group input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }
        .control-group input[type="number"] {
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
        }
        .control-group input[type="number"]:focus { border-color: #667eea; }
        .control-value {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.8rem;
            margin-left: 6px;
        }
        .toggle-group { display: flex; gap: 8px; }
        .toggle-btn {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .toggle-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .chart-container {
            position: relative;
            height: 450px;
            margin: 0 auto;
            background: #fafafa;
            border-radius: 8px;
            overflow: hidden;
        }
        #wealthChart {
            width: 100%;
            height: 100%;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .summary-card h3 {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .summary-card .amount {
            font-size: 2rem;
            font-weight: 700;
        }
        .summary-card .label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 4px;
        }
        .params {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .param-item {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color {
            width: 18px;
            height: 3px;
            border-radius: 2px;
        }
        .legend-color.rate1 { background: #FF6384; }
        .legend-color.rate2 { background: #36A2EB; }
        .legend-color.rate3 { background: #4BC0C0; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #666;
        }
        .amount-cell {
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }
        .color1 { color: #FF6384; }
        .color2 { color: #36A2EB; }
        .color3 { color: #4BC0C0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 定投财富增长模拟</h1>
            <p>复利的力量：长期定投的财富积累</p>
            <div class="params">
                <div class="param-item">📅 起始年龄：<span id="paramStartAge">24</span>岁</div>
                <div class="param-item">🎯 目标年龄：<span id="paramEndAge">70</span>岁</div>
                <div class="param-item">💵 年定投：<span id="paramInvestment">10</span>万元</div>
                <div class="param-item">⏱️ 投资年限：<span id="paramYears">46</span>年</div>
            </div>
        </div>

        <div class="card">
            <h2 style="color: #333; margin-bottom: 15px; font-size: 1.3rem;">⚙️ 参数设置</h2>
            <div class="control-panel">
                <div class="control-group">
                    <label>📅 开始年龄 <span class="control-value" id="startAgeValue">24</span> 岁</label>
                    <input type="range" id="startAge" min="18" max="50" value="24">
                </div>
                <div class="control-group">
                    <label>🎯 目标年龄 <span class="control-value" id="endAgeValue">70</span> 岁</label>
                    <input type="range" id="endAge" min="50" max="100" value="70">
                </div>
                <div class="control-group">
                    <label>💵 年定投金额（万元）</label>
                    <input type="number" id="investment" min="1" max="100" value="10">
                </div>
                <div class="control-group">
                    <label>📈 收益率1 <span class="control-value" id="rate1Value">10</span>%</label>
                    <input type="range" id="rate1" min="0" max="40" value="10">
                </div>
                <div class="control-group">
                    <label>📈 收益率2 <span class="control-value" id="rate2Value">20</span>%</label>
                    <input type="range" id="rate2" min="0" max="40" value="20">
                </div>
                <div class="control-group">
                    <label>📈 收益率3 <span class="control-value" id="rate3Value">30</span>%</label>
                    <input type="range" id="rate3" min="0" max="40" value="30">
                </div>
            </div>
            <div class="control-panel">
                <div class="control-group">
                    <label>📊 Y轴显示模式</label>
                    <div class="toggle-group">
                        <button class="toggle-btn" id="linearBtn">普通刻度</button>
                        <button class="toggle-btn active" id="logBtn">对数刻度</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="chart-container">
                <canvas id="wealthChart"></canvas>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-color rate1"></div><span id="legend1">10% 年收益率</span></div>
                <div class="legend-item"><div class="legend-color rate2"></div><span id="legend2">20% 年收益率</span></div>
                <div class="legend-item"><div class="legend-color rate3"></div><span id="legend3">30% 年收益率</span></div>
            </div>
        </div>

        <div class="card">
            <h2 style="color: #333; margin-bottom: 15px; font-size: 1.3rem;">📊 目标年龄时财富汇总</h2>
            <div class="summary-grid">
                <div class="summary-card">
                    <h3 id="summaryTitle1">年收益率 10%</h3>
                    <div class="amount" id="amount1"></div>
                    <div class="label" id="invest1">累计投入：460万</div>
                    <div class="label" id="multiple1">收益倍数：约 7.4 倍</div>
                </div>
                <div class="summary-card">
                    <h3 id="summaryTitle2">年收益率 20%</h3>
                    <div class="amount" id="amount2"></div>
                    <div class="label" id="invest2">累计投入：460万</div>
                    <div class="label" id="multiple2">收益倍数：约 45.3 倍</div>
                </div>
                <div class="summary-card">
                    <h3 id="summaryTitle3">年收益率 30%</h3>
                    <div class="amount" id="amount3"></div>
                    <div class="label" id="invest3">累计投入：460万</div>
                    <div class="label" id="multiple3">收益倍数：约 220.8 倍</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="color: #333; margin-bottom: 15px; font-size: 1.3rem;">📈 详细数据表格（每5年）</h2>
            <table>
                <thead>
                    <tr>
                        <th>年龄</th>
                        <th><span class="color1">收益率1</span></th>
                        <th><span class="color2">收益率2</span></th>
                        <th><span class="color3">收益率3</span></th>
                    </tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        let yAxisMode = 'log';
        const colors = ['#FF6384', '#36A2EB', '#4BC0C0'];

        function getParams() {
            return {
                startAge: parseInt(document.getElementById('startAge').value),
                endAge: parseInt(document.getElementById('endAge').value),
                investment: parseFloat(document.getElementById('investment').value) * 10000,
                rate1: parseFloat(document.getElementById('rate1').value) / 100,
                rate2: parseFloat(document.getElementById('rate2').value) / 100,
                rate3: parseFloat(document.getElementById('rate3').value) / 100
            };
        }

        function calculateWealth(params) {
            const data = [];
            let w1 = 0, w2 = 0, w3 = 0;
            for (let age = params.startAge; age <= params.endAge; age++) {
                w1 = (w1 + params.investment) * (1 + params.rate1);
                w2 = (w2 + params.investment) * (1 + params.rate2);
                w3 = (w3 + params.investment) * (1 + params.rate3);
                data.push({ age, w1, w2, w3 });
            }
            return data;
        }

        function formatMoney(value) {
            if (value >= 100000000) return (value / 100000000).toFixed(2) + ' 亿';
            if (value >= 10000) return (value / 10000).toFixed(0) + ' 万';
            return value.toFixed(0);
        }

        function drawChart(wealthData, params) {
            const canvas = document.getElementById('wealthChart');
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            
            const width = rect.width;
            const height = rect.height;
            const padding = { top: 40, right: 60, bottom: 50, left: 70 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            ctx.fillStyle = '#fafafa';
            ctx.fillRect(0, 0, width, height);

            const w1Data = wealthData.map(d => d.w1 / 10000);
            const w2Data = wealthData.map(d => d.w2 / 10000);
            const w3Data = wealthData.map(d => d.w3 / 10000);
            const allData = [...w1Data, ...w2Data, ...w3Data];
            const minVal = Math.min(...allData);
            const maxVal = Math.max(...allData);

            let yScale = (y) => {
                if (yAxisMode === 'log') {
                    const minLog = Math.log10(Math.max(minVal, 1));
                    const maxLog = Math.log10(maxVal);
                    const rangeLog = maxLog - minLog || 1;
                    return chartHeight - ((Math.log10(y) - minLog) / rangeLog) * chartHeight;
                } else {
                    return chartHeight - ((y - 0) / (maxVal * 1.1)) * chartHeight;
                }
            };

            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (chartHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();

                let val;
                if (yAxisMode === 'log') {
                    const minLog = Math.log10(Math.max(minVal, 1));
                    const maxLog = Math.log10(maxVal);
                    const rangeLog = maxLog - minLog || 1;
                    val = Math.pow(10, maxLog - (rangeLog / 5) * i);
                } else {
                    val = (maxVal * 1.1 * (5 - i)) / 5;
                }

                ctx.fillStyle = '#666';
                ctx.font = '11px Arial';
                ctx.textAlign = 'right';
                let label = val >= 10000 ? (val / 10000).toFixed(0) + '亿' : val.toFixed(0) + '万';
                ctx.fillText(label, padding.left - 8, y + 4);
            }

            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            const step = Math.max(1, Math.floor(wealthData.length / 8));
            for (let i = 0; i < wealthData.length; i += step) {
                const x = padding.left + (i / (wealthData.length - 1)) * chartWidth;
                ctx.beginPath();
                ctx.moveTo(x, padding.top);
                ctx.lineTo(x, height - padding.bottom);
                ctx.stroke();

                ctx.fillStyle = '#666';
                ctx.font = '11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(wealthData[i].age.toString(), x, height - padding.bottom + 20);
            }

            ctx.fillStyle = '#333';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('年龄', width / 2, height - 10);

            ctx.save();
            ctx.translate(25, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText(`财富（万元）${yAxisMode === 'log' ? '(对数刻度)' : ''}`, 0, 0);
            ctx.restore();

            function drawLine(data, color) {
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                data.forEach((val, i) => {
                    const x = padding.left + (i / (data.length - 1)) * chartWidth;
                    const y = padding.top + yScale(val);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();

                ctx.fillStyle = color + '20';
                ctx.lineTo(padding.left + ((data.length - 1) / (data.length - 1)) * chartWidth, padding.top + chartHeight);
                ctx.lineTo(padding.left, padding.top + chartHeight);
                ctx.closePath();
                ctx.fill();
            }

            drawLine(w1Data, colors[0]);
            drawLine(w2Data, colors[1]);
            drawLine(w3Data, colors[2]);
        }

        function updateSummary(wealthData, params) {
            const finalData = wealthData[wealthData.length - 1];
            const totalYears = params.endAge - params.startAge + 1;
            const totalInvestment = totalYears * params.investment;

            document.getElementById('amount1').textContent = formatMoney(finalData.w1);
            document.getElementById('amount2').textContent = formatMoney(finalData.w2);
            document.getElementById('amount3').textContent = formatMoney(finalData.w3);

            document.getElementById('invest1').textContent = `累计投入：${formatMoney(totalInvestment)}`;
            document.getElementById('invest2').textContent = `累计投入：${formatMoney(totalInvestment)}`;
            document.getElementById('invest3').textContent = `累计投入：${formatMoney(totalInvestment)}`;

            document.getElementById('multiple1').textContent = `收益倍数：约 ${(finalData.w1 / totalInvestment).toFixed(1)} 倍`;
            document.getElementById('multiple2').textContent = `收益倍数：约 ${(finalData.w2 / totalInvestment).toFixed(1)} 倍`;
            document.getElementById('multiple3').textContent = `收益倍数：约 ${(finalData.w3 / totalInvestment).toFixed(1)} 倍`;

            document.getElementById('summaryTitle1').textContent = `年收益率 ${(params.rate1 * 100).toFixed(0)}%`;
            document.getElementById('summaryTitle2').textContent = `年收益率 ${(params.rate2 * 100).toFixed(0)}%`;
            document.getElementById('summaryTitle3').textContent = `年收益率 ${(params.rate3 * 100).toFixed(0)}%`;

            document.getElementById('legend1').textContent = `${(params.rate1 * 100).toFixed(0)}% 年收益率`;
            document.getElementById('legend2').textContent = `${(params.rate2 * 100).toFixed(0)}% 年收益率`;
            document.getElementById('legend3').textContent = `${(params.rate3 * 100).toFixed(0)}% 年收益率`;
        }

        function updateTable(wealthData) {
            const tableBody = document.getElementById('dataTable');
            tableBody.innerHTML = '';

            for (let i = 0; i < wealthData.length; i += 5) {
                const row = wealthData[i];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${row.age}</strong></td>
                    <td class="amount-cell color1">${formatMoney(row.w1)}</td>
                    <td class="amount-cell color2">${formatMoney(row.w2)}</td>
                    <td class="amount-cell color3">${formatMoney(row.w3)}</td>
                `;
                tableBody.appendChild(tr);
            }

            const lastRow = wealthData[wealthData.length - 1];
            const lastTr = document.createElement('tr');
            lastTr.style.background = '#f0f8ff';
            lastTr.innerHTML = `
                <td><strong style="color: #667eea;">${lastRow.age}</strong></td>
                <td class="amount-cell" style="color: #FF6384; font-weight: bold;">${formatMoney(lastRow.w1)}</td>
                <td class="amount-cell" style="color: #36A2EB; font-weight: bold;">${formatMoney(lastRow.w2)}</td>
                <td class="amount-cell" style="color: #4BC0C0; font-weight: bold;">${formatMoney(lastRow.w3)}</td>
            `;
            tableBody.appendChild(lastTr);
        }

        function updateParamsDisplay(params) {
            document.getElementById('paramStartAge').textContent = params.startAge;
            document.getElementById('paramEndAge').textContent = params.endAge;
            document.getElementById('paramInvestment').textContent = (params.investment / 10000).toFixed(0);
            document.getElementById('paramYears').textContent = params.endAge - params.startAge + 1;
        }

        function updateAll() {
            const params = getParams();
            updateParamsDisplay(params);
            
            document.getElementById('startAgeValue').textContent = params.startAge;
            document.getElementById('endAgeValue').textContent = params.endAge;
            document.getElementById('rate1Value').textContent = (params.rate1 * 100).toFixed(0);
            document.getElementById('rate2Value').textContent = (params.rate2 * 100).toFixed(0);
            document.getElementById('rate3Value').textContent = (params.rate3 * 100).toFixed(0);
            
            const wealthData = calculateWealth(params);
            drawChart(wealthData, params);
            updateSummary(wealthData, params);
            updateTable(wealthData);
        }

        document.getElementById('startAge').addEventListener('input', updateAll);
        document.getElementById('endAge').addEventListener('input', updateAll);
        document.getElementById('investment').addEventListener('input', updateAll);
        document.getElementById('rate1').addEventListener('input', updateAll);
        document.getElementById('rate2').addEventListener('input', updateAll);
        document.getElementById('rate3').addEventListener('input', updateAll);

        document.getElementById('linearBtn').addEventListener('click', function() {
            yAxisMode = 'linear';
            document.getElementById('linearBtn').classList.add('active');
            document.getElementById('logBtn').classList.remove('active');
            updateAll();
        });

        document.getElementById('logBtn').addEventListener('click', function() {
            yAxisMode = 'log';
            document.getElementById('logBtn').classList.add('active');
            document.getElementById('linearBtn').classList.remove('active');
            updateAll();
        });

        window.addEventListener('resize', updateAll);

        document.addEventListener('DOMContentLoaded', updateAll);
    </script>
</body>
</html>
